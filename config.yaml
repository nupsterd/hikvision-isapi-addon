name: Hikvision ISAPI Listener
version: "1.2.0"
slug: hikvision_isapi_listener
description: >
  Listener del Event Stream ISAPI de controladores de acceso Hikvision.
  Audita todos los eventos en JSON Lines local, reenvía eventos relevantes
  a un webhook de Home Assistant, y opcionalmente hace fan-out al
  backend pv-backend.

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: services
boot: auto
init: false

options:
  controller_host: "192.168.18.70"
  controller_user: "admin"
  controller_password: ""
  ha_webhook_url: "https://192.168.18.60:8123/api/webhook/hikvision_access_event"
  audit_log_path: "/config/audit.log"
  reconnect_delay: 5
  pv_backend_url: ""
  pv_backend_verify_token: ""
  pv_backend_queue_maxsize: 1000
  pv_backend_timeout_seconds: 3

schema:
  controller_host: str
  controller_user: str
  controller_password: password
  ha_webhook_url: url
  audit_log_path: str
  reconnect_delay: int(1,300)
  pv_backend_url: "str?"
  pv_backend_verify_token: "password?"
  pv_backend_queue_maxsize: "int(10,100000)"
  pv_backend_timeout_seconds: "int(1,30)"

map:
  - data:rw            # transicional: la migración lee /data/audit.log. Se quita en v1.3.0 (§9.3).
  - addon_config:rw    # monta /config -> /addon_configs/<slug>/ (visible desde core-ssh)